  <script>
    const REGISTRY_URL = './adlp_registry_v1.6.0.json';
    const EVENT_TYPES = ['FAULT', 'WARNING', 'MAINTENANCE', 'STATE_CHANGE', 'RECOVERY'];
    let registry = null;
    let mode = 'code';

    async function loadRegistry() {
      try {
        const res = await fetch(REGISTRY_URL);
        registry = await res.json();
        document.getElementById('registryStatus').textContent = 'Registry v1.6.0 loaded';
        document.getElementById('registryStatus').style.color = '#3ecf6a';
        document.getElementById('validateBtn').disabled = false;
        document.getElementById('btnText').textContent = '▶ Validate';
      } catch (e) {
        document.getElementById('registryStatus').textContent = 'Registry load failed';
        document.getElementById('registryStatus').style.color = '#e84040';
      }
    }

    function setMode(m) {
      mode = m;
      document.getElementById('modeCode').style.display = m === 'code' ? '' : 'none';
      document.getElementById('modePacket').style.display = m === 'packet' ? '' : 'none';
      document.getElementById('tabCode').classList.toggle('active', m === 'code');
      document.getElementById('tabPacket').classList.toggle('active', m === 'packet');
      resetResult();
    }

    function setExample(code) {
      document.getElementById('codeInput').value = code;
      setMode('code');
    }

    function resetResult() {
      document.getElementById('resultBadge').textContent = '—';
      document.getElementById('resultBadge').style.color = '';
      document.getElementById('resultBody').innerHTML = `
        <div class="result-idle">
          <div class="idle-icon">◈</div>
          Enter a code or packet and press Validate
        </div>`;
    }

    function validateCode(code) {
      const errors = [];
      const parts = code.split('.');

      if (parts.length !== 4) {
        errors.push('Code must have exactly 4 parts: DOMAIN.SYSTEM.FAULT.SEVERITY');
        return { valid: false, errors, parts: { raw: code } };
      }

      const [domain, system, fault, severity] = parts;

      // Registry uses flat arrays
      const domainArr  = registry.domains     || [];
      const systemArr  = registry.systems     || [];
      const faultArr   = registry.fault_types || registry.faults || [];
      const validSeverities = ['S1','S2','S3','S4','S5'];

      const domainFound = domainArr.some(d => d.name === domain);
      if (!domainFound) errors.push(`Domain "${domain}" not found in registry`);

      const systemFound = systemArr.some(s => s.domain === domain && s.name === system);
      if (domainFound && !systemFound) errors.push(`System "${system}" not found in domain "${domain}"`);

      const faultData = faultArr.find(f => f.name === fault);
      if (!faultData) {
        errors.push(`Fault type "${fault}" not found in registry`);
      } else {
        const applicable = faultData.domains_applicable || [];
        if (applicable.length && !applicable.includes(domain)) {
          errors.push(`Fault type "${fault}" is not applicable to domain "${domain}". Applicable: ${applicable.join(', ')}`);
        }
      }

      if (!validSeverities.includes(severity)) {
        errors.push(`Severity "${severity}" is invalid. Must be S1–S4`);
      } else if (faultData) {
        const allowed = faultData.severity_guidance || faultData.severities || [];
        if (allowed.length && !allowed.includes(severity)) {
          errors.push(`Severity "${severity}" not in guidance for "${fault}". Guidance: ${allowed.join(', ')}`);
        }
      }

      return {
        valid: errors.length === 0,
        errors,
        parts: { domain, system, fault, severity, domainFound, systemFound, faultData }
      };
    }

    function validatePacket(json) {
      const errors = [];
      let parsed;
      try { parsed = JSON.parse(json); } catch(e) {
        return { valid: false, errors: [`Invalid JSON: ${e.message}`], parts: {} };
      }

      if (!parsed.adlp_version) errors.push('Missing required field: adlp_version');
      if (!parsed.registry_version) errors.push('Missing required field: registry_version');
      if (!parsed.canonical_code) errors.push('Missing required field: canonical_code');
      if (!parsed.event) errors.push('Missing required field: event');

      let codeResult = null;
      if (parsed.canonical_code) {
        codeResult = validateCode(parsed.canonical_code);
        errors.push(...codeResult.errors);
      }

      if (parsed.event) {
        const evt = parsed.event;
        if (!evt.event_type) errors.push('Missing event.event_type');
        else if (!EVENT_TYPES.includes(evt.event_type))
          errors.push(`event_type "${evt.event_type}" is not a valid protocol event type`);

        if (parsed.canonical_code && codeResult && codeResult.parts) {
          const p = codeResult.parts;
          if (p.domain && evt.domain && evt.domain !== p.domain)
            errors.push(`event.domain "${evt.domain}" does not match canonical_code domain "${p.domain}"`);
          if (p.system && evt.system && evt.system !== p.system)
            errors.push(`event.system "${evt.system}" does not match canonical_code system "${p.system}"`);
        }
      }

      return {
        valid: errors.length === 0,
        errors,
        parts: { parsed, codeResult },
        isPacket: true
      };
    }

    function renderResult(result) {
      const valid = result.valid;
      const badge = document.getElementById('resultBadge');
      badge.textContent = valid ? '✓ VALID' : '✗ INVALID';
      badge.style.color = valid ? '#3ecf6a' : '#e84040';

      let html = `
        <div class="result-content">
          <div class="result-status ${valid ? 'valid' : 'invalid'}">
            <span class="status-icon">${valid ? '✓' : '✗'}</span>
            <span class="status-text">${valid ? 'VALID — Registry v1.6.0' : 'INVALID PACKET'}</span>
          </div>`;

      // Breakdown for code
      if (!result.isPacket && result.parts && result.parts.domain !== undefined) {
        const p = result.parts;
        html += `<div class="breakdown-title">Code Breakdown</div>
          <div class="breakdown-rows">`;

        const checks = [
          { key: 'DOMAIN',    val: p.domain,   ok: !!p.domainFound },
          { key: 'SYSTEM',    val: p.system,   ok: !!p.systemFound },
          { key: 'FAULT TYPE',val: p.fault,    ok: !!p.faultData },
          { key: 'SEVERITY',  val: p.severity, ok: ['S1','S2','S3','S4','S5'].includes(p.severity) },
        ];

        checks.forEach(c => {
          const cls = c.ok ? 'ok' : 'fail';
          const icon = c.ok ? '✓' : '✗';
          const valCls = c.ok ? 'valid-val' : 'invalid-val';
          html += `
            <div class="breakdown-row">
              <span class="breakdown-check ${cls}">${icon}</span>
              <span class="breakdown-key">${c.key}</span>
              <span class="breakdown-val ${valCls}">${c.val || '—'}</span>
            </div>`;
        });

        html += `</div>`;
      }

      // Breakdown for packet
      if (result.isPacket && result.parts && result.parts.parsed) {
        const parsed = result.parts.parsed;
        html += `<div class="breakdown-title">Packet Fields</div>
          <div class="breakdown-rows">`;

        const fields = [
          { key: 'adlp_version', val: parsed.adlp_version },
          { key: 'registry_version', val: parsed.registry_version },
          { key: 'canonical_code', val: parsed.canonical_code },
          { key: 'event_type', val: parsed.event && parsed.event.event_type },
        ];

        fields.forEach(f => {
          const ok = !!f.val;
          const isEventType = f.key === 'event_type';
          const eventOk = isEventType ? EVENT_TYPES.includes(f.val) : true;
          const allOk = ok && eventOk;
          html += `
            <div class="breakdown-row">
              <span class="breakdown-check ${allOk ? 'ok' : 'fail'}">${allOk ? '✓' : '✗'}</span>
              <span class="breakdown-key">${f.key}</span>
              <span class="breakdown-val ${f.val ? 'valid-val' : 'invalid-val'}">${f.val || 'missing'}</span>
            </div>`;
        });

        html += `</div>`;
      }

      // Errors
      if (!valid && result.errors.length) {
        html += `<div class="errors-title">Errors (${result.errors.length})</div>`;
        result.errors.forEach(e => {
          html += `<div class="error-item"><span class="error-bullet">✗</span>${e}</div>`;
        });
      }

      html += `</div>`;
      document.getElementById('resultBody').innerHTML = html;
    }

    function validate() {
      if (!registry) return;
      let result;
      if (mode === 'code') {
        const code = document.getElementById('codeInput').value.trim().toUpperCase();
        if (!code) return;
        result = validateCode(code);
      } else {
        const json = document.getElementById('packetInput').value.trim();
        if (!json) return;
        result = validatePacket(json);
      }
      renderResult(result);
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.target.id === 'codeInput') && !document.getElementById('validateBtn').disabled) {
        validate();
      }
    });

    loadRegistry();
  </script>

</body>
</html>
