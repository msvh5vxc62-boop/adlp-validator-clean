name: ADLP Validator CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validator
        run: pip install -e .

      - name: Validate valid example packets
        run: |
          python -m adlp_validator.cli examples/valid \
            --registry registry/adlp_registry_v1.6.0.json \
            --json-report > valid_validation_report.json

      - name: Ensure invalid example packets fail
        run: |
          ! python -m adlp_validator.cli examples/invalid \
            --registry registry/adlp_registry_v1.5.0.json \
            --json-report > invalid_validation_report.json

      - name: Upload validation reports
        uses: actions/upload-artifact@v4
        with:
          name: adlp-validation-reports
          path: |
            valid_validation_report.json
            invalid_validation_report.json